var controlTypeList = {};

function Control(controlTypeName) {
	this.Name = controlTypeName;
	this.Properties = [];
}

function Property(propertyName, value) {
	this.PropertyName = propertyName;
	this.Value = value;
}

function PropertyMetaData(propertyName) {
	this.Name = propertyName;
}

function Form(formId) {
	this.Fields = [];  //NOTE: to use array instead of associative array (dictionary) so can be used for serialization without creating special model binder
	this.Properties = [];
	this.Pages = [];
}


function Field(controlType, fieldName, pageName, sectionName) {
	this.Name = fieldName;
	this.ControlName = controlType.Name;
	this.PageName = pageName;
	this.SectionName = sectionName;
	var fieldProperties = []; //NOTE: to use array instead of associative array (dictionary) so can be used for serialization without creating special model binder
	for (var index in controlType.Properties) {
		var property = controlType.Properties[index];
		var propertyValue = new Property(property.Name, (property.DefaultValue != null ? property.DefaultValue : ""));
		if (property.Name == "Name") {
			propertyValue.Value = fieldName;
		}
		fieldProperties.push(propertyValue);
	}
	this.Properties = fieldProperties;
}


function AddFormField(controlName, fieldName, pageName, sectionName) {
	try{
		var selectedControlType = controlTypeList[controlName];
		if (selectedControlType == null) {
			throw controlName + " is not found in Control Type Collection";
		}
		var newField = new Field(selectedControlType, fieldName, pageName, sectionName);
		form.Fields.push(newField);

		return newField;
	}
	catch (err) {
		alert(err);
	}
}

{

function ResetToggledOption(hiddenFieldsArray, propertiesArray)
{
    for (var i=0; i<hiddenFieldsArray.length; i++)
    {
        var fieldName = hiddenFieldsArray[i].substring(1, hiddenFieldsArray[i].indexOf('.'));
        var selector = hiddenFieldsArray[i];
        var defaultValue = GetPropertyValue(propertiesArray[i], "DefaultValue");
        var timeFormat = GetPropertyValue(propertiesArray[i], "TimeInputType");
        var dateFormat = GetPropertyValue(propertiesArray[i], "DateInputType");
        $(selector).find(':input').each(function() {
            if (this.type == 'submit' || this.type == 'button')
            {
                //do nothing
            }
            else if (this.type.indexOf('select') != -1)
            {
                if (timeFormat != '' && timeFormat != 'undefined') //Used to reset time
                {
                    var hour, minutes, time;
                    var day, month, year;
                    if (timeFormat == '24hr format') //Handled differently for 12 and 24 hours format
                    {
                        if (defaultValue != '' &&  defaultValue != 'undefined')
                        {
                            hour = parseInt(defaultValue.split(':')[0]);
                            minutes = parseInt(defaultValue.split(':')[1]);
                            if ($(this).attr('class') == 'hour_drop_down')
                                $(this).val(hour).change();
                            else 
                                $(this).val(minutes).change();
                        }
                        else
                        {
                            $(this).find('option:first').attr('selected', 'selected');
                        }
                    }
                    else if (timeFormat == '12hr format') 
                    {
                        if (defaultValue != '' &&  defaultValue != 'undefined')
                        {
                            hour = parseInt(defaultValue.split(':')[0]);
                            minutes = parseInt(defaultValue.split(':')[1]);
                            if ($(this).attr('class') == 'hour_drop_down')
                                $(this).val(hour-12).change();
                            else if ($(this).attr('class') == 'minute_drop_down')
                                $(this).val(minutes).change();
                            else
                            {
                                if (hour<12)
                                  $(this).val("AM").change();
                                else
                                  $(this).val("PM").change();
                            }
                        }
                        else
                        {
                            $(this).find('option:first').attr('selected', 'selected');
                        }
                    }
                    else 
                    {
                        if (dateFormat != '' && dateFormat != 'undefined') //Used to reset date
                        {
                            var date = new Date();
                            month = date.getMonth() + 1;
                            day = date.getDate();
                            year = date.getFullYear();
                            if (defaultValue != '' &&  defaultValue != 'undefined')
                            {
                                if (defaultValue == 'Today' || defaultValue == 'Tomorrow')
                                {
                                    if (defaultValue == 'Tomorrow') day = date.getDate() + 1;
                                    if ($(this).attr('class') == 'year_drop_down')
                                        $(this).val(year).change();
                                    else if ($(this).attr('class') == 'month_drop_down')
                                        $(this).val(month).change();
                                    else
                                    {
                                        $(this).val(day).change();
                                    }
                                }
                                else
                                {
                                    $(this).find('option:first').attr('selected', 'selected');
                                }
                            }
                            else
                            {
                                $(this).find('option:first').attr('selected', 'selected');
                            }
                        }
                    }
                }
                else
                {
                    if (defaultValue != '')
                        $(this).val(defaultValue).change();
                    else
                        $(this).find('option:first').attr('selected', 'selected');
                }
                $.uniform.update(this);
                var text = $('#'+$(this).attr('id') + ' option:selected').html();
                $("#uniform-" + $(this).attr('id')).children('span').text('').append('<div></div>').children('div').text(text);
            }
            else if (this.type == 'checkbox' || this.type == 'radio')
            {
                var hasClick = $(this).attr('onclick');
                if (hasClick != null) //This is only use for address checking. First radio button default set to checked as per BAU
                {
                    $(selector+' input:radio[disabled=false]:first').attr('checked', true);
                }
                else{
                    if (defaultValue != '' && $(this).val() == defaultValue)
                        this.checked = true;
                    else
                        this.checked = false;
                }
                $.uniform.update(this);
            }
            else if (this.type == 'file')
            {
                ResetFile(fieldName);
            }
            else 
            {
                if ($(this).hasClass('date') && dateFormat != '' && dateFormat != 'undefined') //Used to reset date
                {
                    var date = new Date();
                    var month = date.getMonth();
                    var day = date.getDate();
                    var year = date.getFullYear();
                    var monthsShort = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                    if (defaultValue != '' &&  defaultValue != 'undefined')
                    {
                        if (defaultValue == 'Today' || defaultValue == 'Tomorrow')
                        {
                            if (defaultValue == 'Tomorrow') day = date.getDate() + 1;
                            $(this).val(day + ' ' + monthsShort[month] + ' ' + year);
                        }
                        else
                        {
                            $(this).val('');
                        }
                    }
                    else
                    {
                        $(this).val('');
                    }
                }
                else
                {
                    if (defaultValue == '' || defaultValue === 'undefined')
                        $(this).val('');
                    else
                        $(this).val(defaultValue);
                }
                //Remove any error for address
                if ($(this).hasClass('errorBox'))
                {
                    console.log($(this).attr('id'));
                    $(this).removeClass('errorBox')
                    $('#'+fieldName+'').children('span.errormsg').remove();
                }
            }
        });
    }
}

function evaluateValue(thisFieldName, type, onEvent) {    
    if (type == null) {
        type = GetFieldsType(thisFieldName);
    }
    for (var index in form.Fields) {
        var tempProp = form.Fields[index].Properties;
        if (GetPropertyValue(tempProp, "ConditionalLogicFlag") == "Yes") {
            if (GetPropertyValue(tempProp, "ConditionFieldName") == thisFieldName) {
                var expression = GetPropertyValue(tempProp, "Expression");
                var expressionValue = GetPropertyValue(tempProp, "ExpressionValue");
                if (type == "Date") {
                    evaluateDateExpression(expression, thisFieldName, expressionValue, form.Fields[index].Name);
                } else if (type == "Time") {
                    expressionValue = expressionValue.replace(':', '');
                    evaluateExpression(expression, thisFieldName, expressionValue, form.Fields[index].Name, type, false); 
                } else {
                    evaluateExpression(expression, thisFieldName, expressionValue, form.Fields[index].Name, null, onEvent);    
                }
            }
        }
    }
}

	function evaluateDateExpression(expression, conditionalField, expressionValue, fieldName)
	{
		conditionalField = '_OFE_' + conditionalField;
    var isValid = false;
		var expValueTemp = expressionValue.split("/");
		var expValue = new Date(expValueTemp[2], expValueTemp[1]-1, expValueTemp[0]);

		var dateValue = null;
		var fieldVal = $('#' + conditionalField + '').val().split("/");
		if(fieldVal.length >= 3)
		{
			dateValue =  new Date(fieldVal[2], fieldVal[1]-1, fieldVal[0]);
		}
		else
		{
			dateValue = new Date($('#' + conditionalField + '').val());
		}
		if (expression == "=") 
		{
			if( dateValue.valueOf() == expValue.valueOf())
			{
				isValid = true;
			}
		}
		else if (expression == ">") 
		{
			if( dateValue.valueOf() > expValue.valueOf())
			{
				isValid = true;
			}
		}
		else if (expression == "<") 
		{
			if( dateValue.valueOf() < expValue.valueOf())
			{
				isValid = true;
			}
		}
		else if (expression == "<=") 
		{
			if( dateValue.valueOf() <= expValue.valueOf())
			{
				isValid = true;
			}
		}
		else if (expression == ">=") 
		{
			if( dateValue.valueOf() >= expValue.valueOf())
			{
				isValid = true;
			}
		}
		else if (expression == "!=") 
		{
			if( dateValue.valueOf() != expValue.valueOf())
			{
				isValid = true;
			}
		}

		for (var index in form.Fields) 
		{
	    if(form.Fields[index].Name == fieldName)
      {
            var tempProp = form.Fields[index].Properties;
				if (GetPropertyValue(tempProp, "ConditionalLogicFlag") == "Yes") 
				{
					if (GetPropertyValue(tempProp, "Action") == "Hide") 
					{
						if (GetPropertyValue(tempProp, "ExpressionValue") != "")
						{
                if(isValid)
                {
										$('#' + fieldName + '.fieldgroup').hide();
                }
                else{
                    $('#' + fieldName + '.fieldgroup').show();
                }
						}
					}
          else
					{
            if (GetPropertyValue(tempProp, "ExpressionValue") != "")
						{
              if(isValid)
              {
							    $('#' + fieldName + '.fieldgroup').show();
              }
              else
              {
                  $('#' + fieldName + '.fieldgroup').hide();
              }
						}
          }
				}
			        
      }
		}
	}

	function GetAddress(postalCodeHolder,fieldName)
	{	//$('#processingDiv').show();
		var postalCode = $('#'+postalCodeHolder+'').val();
		var reqData  = { "Postalcode": postalCode };
		var reqJson = $.toJSON(reqData);
		var returnData;
        $.ajax({ url: '/onlineform/PublicOnlineForm/GetAddress',
            type: 'POST',
            dataType: 'json',
            data: reqJson,
            contentType: 'application/json; charset=utf-8',
            async: false,
            success: function (result) {
                $('#processingDiv').hide();
                RefreshIdleTimeout();
                returnData = result;
				if (result.ErrStatus == 0){
                    $('#'+fieldName+'').children('.errormsg').remove();
                    $('#'+postalCodeHolder+'').removeClass('errorBox');
                    $('#' + fieldName + 'PostalCode').val(result.Postalcode);  
                    $('#' + fieldName + 'BlockNo').val(result.Block);    
                    $('#' + fieldName + 'StreetName').val(result.StreetName);
					$('#' + fieldName + 'UnitNo1').val(result.FloorNo);
					$('#' + fieldName + 'UnitNo2').val(result.UnitNo);
					$('#' + fieldName + 'BuildingName').val(result.BuildingName);
				}
                else
                {
                    $('#'+fieldName+'').children('.errormsg').remove();
                    $('#'+postalCodeHolder+'').removeClass('errorBox');
                    var errorMessage = result.ErrMessage;
                    //$('#'+postalCodeHolder+'').parent('div').append("<span class='errormsg'>"+errorMessage+"</span>");
                    $('#'+postalCodeHolder+'').addClass('errorBox')
                    if(errorMessage != null){
                        $('#'+fieldName+'').append("<span class='errormsg'>"+errorMessage+"</span>");
                    }
                }
            },
            error: function (errorThrown) {
                RefreshIdleTimeout();
                $('#processingDiv').hide();
                setErrorPage();
            }
        });
        return returnData;
	}

function BindDatePickerOFE()
{
	if ($('.calendar-ofe').length > 0) {
	
		var curContainer;
		var curInput;
		var now = new Date();
		var day = now.getDate();
		var month = now.getMonth() + 1;
		var year = now.getFullYear();
		curDate = day + '/' + month + '/' + year;
		$(".calendar-ofe").DatePicker({
			flat: false,
			format: 'd b Y',
			date: curDate,
			current: curDate,
			position: 'top',
			onChange: function (formated, dates) {
				$(curInput).val(formated);
				var fieldName = $(curInput).attr("id");
				fieldName = fieldName.replace('_OFE_', '');
				evaluateValue(fieldName,"Date", onEvent = false);
			},
			onShow: function (data) {
				var calId = $(this).data('datepickerId');
				caltop = $(this).offset().top + 22 + 'px';
				calleft = $(this).offset().left - 10 + 'px';
				$('#' + calId).css({ top: caltop, left: calleft });
				return true;
			},
			onBeforeShow: function () {
				var dpObj = $(this).data('datepickerId');

			}
		});

		// SHOW CALENDARS
		$('.calendar-icon').bind('click', function () {
			if ($(this).is('.disabled')) return;
			if ($(this).parent().find('.datepicker').css('visibility') != 'visible') {
				$(this).parent().find('.calendar-ofe').DatePickerShow();
				curInput = $(this).parent().find('input.date');
			} else {
				$(this).parent().find('.datepicker').css('visibility', 'hidden');
			}
		});
	}
}

		function daysInMonth(month, year) {
			return new Date(year, month, 0).getDate();
		}

		//Update DROP DOWN Day
		$('.month_drop_down, .year_drop_down').change(function () {
			var dropDownId = $(this).attr('id');
			var selectedYear = $('#' + dropDownId + '.year_drop_down').val();
			var selectedMonth = $('#' + dropDownId + '.month_drop_down').val();
			var selectedDay = $('#' + dropDownId + '.day_drop_down').val();
			var numOfDay = daysInMonth(selectedMonth, selectedYear);

			//Update Day
			$('#' + dropDownId + '.day_drop_down').empty();
			$('#' + dropDownId + '.day_drop_down').append('<option value="0">  - </option>');
			if (selectedDay > numOfDay) {
				selectedDay = numOfDay; //if selected day is more than the selected month number of days set to max day
			}
			if (selectedDay != 0) {
				$('#' + dropDownId + '.day_drop_down').parent().children('span').children('div').text(selectedDay);
			}
			for (i = 1; i <= numOfDay; i++) {
				if (i == selectedDay) {
					$('#' + dropDownId + '.day_drop_down').append('<option value=' + i + ' selected> ' + i + ' </option>');
				}
				else {
					$('#' + dropDownId + '.day_drop_down').append('<option value=' + i + '> ' + i + ' </option>');
				}
			}

		});

		$('.address_options').click(function () {

			var fieldName = $(this).attr('name');

			$('.address_options').each(function () {
				if ($(this).val() != selectedAddress) {
					$('#' + fieldName + '_' + $(this).val() + '').hide();
				}
			});
			$('#' + fieldName + '_' + selectedAddress + '').show();

		});

function UploadFile(file)
{
    var fileUpload = $('input:file[name="'+file+'"]');
    if(fileUpload.val() != null && fileUpload.val() != "")
    {
        $(fileUpload).upload('/onlineform/PublicOnlineForm/UploadFile/', 
            function(data) {
                if(data.status == "True")
                {
                    $('#file_label_content_'+data.field_name).show();
                    $('#uniform-upload_input_'+data.field_name).hide();
                    $('#uniform-upload_input_'+data.field_name).children('.filename').text(data.file_name);
                    $('#file_label_'+data.field_name).text(data.file_name).show();
                    $('#'+data.field_name).children('span.errormsg').remove();
                    $('#upload_success_'+data.field_name).html('<span class="icon"></span> File uploaded').show();
                    $('#upload_button_'+data.field_name).hide();
			    }
                else
                {
                    $('#'+data.field_name).children('span.errormsg').remove();
                    $('#upload_input_'+data.field_name).addClass("errorBox");
                    $('#'+data.field_name).append("<span class='errormsg'>"+data.error+"</span>");
                    $('#uniform-upload_input_'+data.field_name).children('.filename').text("");
                    $('#upload_success_'+data.field_name).html('');
                    $('#upload_button_'+data.field_name).show();
                }
                resetAntiForgeryPageValues('__RequestVerificationToken',data.anti_forgery);
            }, 'json');
    }
}
function DeleteFile(fieldName)
{   
    var url = '/onlineform/PublicOnlineForm/DeleteUploaFile?FieldName=VARfieldname';
    url = url.replace(/VARfieldname/gi, fieldName);
    $.get(url, function (data) {
		RefreshIdleTimeout();
        if(data == 0)
        {
            $('input:file[name="'+fieldName+'"]').replaceWith($('input:file[name="'+fieldName+'"]').clone(true));

            $('#file_label_content_'+fieldName).hide();
            $('#uniform-upload_input_'+fieldName).show();
            $('#uniform-upload_input_'+fieldName).children('.filename').text("");

            $('#upload_container_'+fieldName).show();

        }
